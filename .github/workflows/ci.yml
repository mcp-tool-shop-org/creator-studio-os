name: CI

on:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "src/**"
      - "tests/**"
      - "tsconfig.json"
      - "vitest.config.ts"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "package.json"
      - "src/**"
      - "tests/**"
      - "tsconfig.json"
      - "vitest.config.ts"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci --force
      - run: npm audit --audit-level=high
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

  coverage:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci --force
      - run: npm run build
      - run: npx vitest run --coverage
      - uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
