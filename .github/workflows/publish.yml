name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 2.0.0, no v prefix)"
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Pre-flight checks
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from tag or input
        id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Assert all 10 package.json versions match tag
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"
          MANIFESTS=(
            "packages/core/package.json"
            "packages/compressor/package.json"
            "packages/fcp/package.json"
            "packages/iwork-docs/package.json"
            "packages/keynote/package.json"
            "packages/logic/package.json"
            "packages/motion/package.json"
            "packages/pixelmator/package.json"
            "packages/protocols/package.json"
            "apps/creator-studio-os/package.json"
          )
          FAIL=0
          for MANIFEST in "${MANIFESTS[@]}"; do
            PKG_VERSION=$(node -p "require('./$MANIFEST').version")
            if [[ "$PKG_VERSION" != "$VERSION" ]]; then
              echo "MISMATCH: $MANIFEST has version $PKG_VERSION, expected $VERSION"
              FAIL=1
            fi
          done
          if [[ $FAIL -eq 1 ]]; then
            echo ""
            echo "Version mismatch — bump all package.json files to $VERSION before releasing."
            exit 1
          fi
          echo "All 10 packages are at $VERSION ✓"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - run: npm ci --force
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

      - name: Dry-run pack all workspaces
        run: npm pack --dry-run --workspaces

  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    needs: preflight
    permissions:
      contents: read
      id-token: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - run: npm ci --force
      - run: npm run build

      - name: Verify token can publish to @creator-studio-os scope
        run: |
          echo "Token identity:"
          npm whoami
          echo ""
          echo "Packages visible under @creator-studio-os:"
          npm access list packages @creator-studio-os || true
          echo ""
          # Confirm the token can write to the scope — npm publish --dry-run on core
          # is the cheapest real auth probe (build already ran, no registry side-effect).
          npm publish --workspace=@creator-studio-os/core --access public --dry-run
          echo "Scope access confirmed ✓"

      # Publish in dependency order so each package resolves its deps on the registry.
      # core has no workspace deps — always first.
      - name: Publish @creator-studio-os/core
        run: npm publish --workspace=@creator-studio-os/core --access public --provenance

      # Leaves all depend only on core — publish after core, order within group is safe.
      - name: Publish @creator-studio-os/compressor
        run: npm publish --workspace=@creator-studio-os/compressor --access public --provenance

      - name: Publish @creator-studio-os/fcp
        run: npm publish --workspace=@creator-studio-os/fcp --access public --provenance

      - name: Publish @creator-studio-os/iwork-docs
        run: npm publish --workspace=@creator-studio-os/iwork-docs --access public --provenance

      - name: Publish @creator-studio-os/keynote
        run: npm publish --workspace=@creator-studio-os/keynote --access public --provenance

      - name: Publish @creator-studio-os/logic
        run: npm publish --workspace=@creator-studio-os/logic --access public --provenance

      - name: Publish @creator-studio-os/motion
        run: npm publish --workspace=@creator-studio-os/motion --access public --provenance

      - name: Publish @creator-studio-os/pixelmator
        run: npm publish --workspace=@creator-studio-os/pixelmator --access public --provenance

      # protocols depends on all 8 leaves — publish after the group above.
      - name: Publish @creator-studio-os/protocols
        run: npm publish --workspace=@creator-studio-os/protocols --access public --provenance

      # Umbrella CLI depends on everything — always last.
      - name: Publish @creator-studio-os/creator-studio-os
        run: npm publish --workspace=@creator-studio-os/creator-studio-os --access public --provenance

      - name: Verify all packages resolved on registry
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          PACKAGES=(
            "@creator-studio-os/core"
            "@creator-studio-os/compressor"
            "@creator-studio-os/fcp"
            "@creator-studio-os/iwork-docs"
            "@creator-studio-os/keynote"
            "@creator-studio-os/logic"
            "@creator-studio-os/motion"
            "@creator-studio-os/pixelmator"
            "@creator-studio-os/protocols"
            "@creator-studio-os/creator-studio-os"
          )
          for PKG in "${PACKAGES[@]}"; do
            echo "Verifying $PKG@$VERSION ..."
            for i in 1 2 3 4 5 6; do
              if npm view "$PKG@$VERSION" version 2>/dev/null; then
                break
              fi
              if [[ $i -eq 6 ]]; then
                echo "FAIL: $PKG@$VERSION not visible on registry after 60s"
                exit 1
              fi
              echo "  not yet visible, retrying in 10s (attempt $i/6)..."
              sleep 10
            done
          done
          echo ""
          echo "All 10 packages verified on npm registry ✓"
